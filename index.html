<form id="addItemForm">
  <div class="form-group">
    <label for="manufacturer">Manufacturer</label>
    <select name="manufacturer" id="manufacturer" required>
      <option value="">--Select Manufacturer--</option>
      <option value="anker">Anker</option>
      <option value="anycubic">Anycubic</option>
      <option value="bambu">Bambu Labs</option>
      <option value="creality">Creality</option>
      <option value="elegoo">Elegoo</option>
      <option value="geeetech">Geeetech</option>
      <option value="prusa">Prusa</option>
      <option value="qidi">Qidi</option>
      <option value="tronxy">Tronxy</option>
      <option value="vivedino">Vivedino</option>
      <option value="voron">Voron</option>
      <option value="voxelab">Voxelab</option>
    </select>
  </div>

  <div class="form-group">
    <label for="filamentColor">Filament Color</label>
    <div style="display: flex; align-items: center; gap: 10px;">
      <input type="color" id="filamentColor" name="filamentColor" value="#2563eb" style="width: 50px; height: 50px; border: none; cursor: pointer;">
      <input type="text" id="colorHex" value="#2563eb" pattern="^#+([a-fA-F0-9]{6}|[a-fA-F0-9]{3})$" style="width: 100px; text-transform: uppercase;">
    </div>
    <small>Click the box for the wheel/slider or type a Hex code.</small>
  </div>

  <button type="submit" class="submit-btn">Add to Stock</button>
</form>

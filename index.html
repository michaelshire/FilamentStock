<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        header {
            max-width: 1000px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Inventory Grid */
        #inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid #22c55e;
            transition: transform 0.2s;
            position: relative;
        }

        .card.oos {
            border-top-color: #ef4444;
        }

        .card h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .card p { margin: 4px 0; color: #64748b; font-size: 0.95rem; }

        .controls {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            border: none;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1);
            background: #1d4ed8;
        }

        /* Modal Overlay */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .modal h2 { margin-top: 0; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-cancel { background: #e2e8f0; color: #475569; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Inventory Dashboard</h1>
        <select id="stockFilter" onchange="renderItems()" style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
            <option value="all">Show All</option>
            <option value="in">In Stock</option>
            <option value="out">Out of Stock</option>
        </select>
    </header>

    <main id="inventory-grid">
        </main>

    <button class="fab" onclick="openModal()" title="Add New Item">+</button>

    <div id="modal-overlay">
        <div class="modal">
            <h2>New Product</h2>
            <div class="form-group">
                <label>Manufacturer</label>
                <input type="text" id="mfrIn" placeholder="e.g. Sony">
            </div>
            <div class="form-group">
                <label>Type</label>
                <input type="text" id="typeIn" placeholder="e.g. Headphones">
            </div>
            <div class="form-group">
                <label>Colour</label>
                <input type="text" id="colorIn" placeholder="e.g. Midnight Blue">
            </div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-add" onclick="saveItem()">Add to Stock</button>
            </div>
        </div>
    </div>

    <script>
        // Data persists in browser's local storage
        let inventory = JSON.parse(localStorage.getItem('user_inventory_data')) || [];

        function renderItems() {
            const grid = document.getElementById('inventory-grid');
            const filter = document.getElementById('stockFilter').value;
            grid.innerHTML = '';

            const filteredList = inventory.filter(item => {
                if (filter === 'in') return item.qty > 0;
                if (filter === 'out') return item.qty === 0;
                return true;
            });

            if (filteredList.length === 0) {
                grid.innerHTML = '<div class="empty-state">No items found. Click the + to add one!</div>';
                return;
            }

            filteredList.forEach((item, originalIndex) => {
                const card = document.createElement('div');
                card.className = `card ${item.qty === 0 ? 'oos' : ''}`;
                
                // We find the real index in the main 'inventory' array for updates
                const realIdx = inventory.indexOf(item);

                card.innerHTML = `
                    <h3>${item.mfr}</h3>
                    <p><strong>Type:</strong> ${item.type}</p>
                    <p><strong>Colour:</strong> ${item.color}</p>
                    <div class="controls">
                        <label>Qty:</label>
                        <input type="number" value="${item.qty}" min="0" onchange="updateQty(${realIdx}, this.value)">
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            // Clear inputs
            document.getElementById('mfrIn').value = '';
            document.getElementById('typeIn').value = '';
            document.getElementById('colorIn').value = '';
        }

        function saveItem() {
            const mfr = document.getElementById('mfrIn').value;
            const type = document.getElementById('typeIn').value;
            const color = document.getElementById('colorIn').value;

            if (!mfr || !type || !color) {
                alert("Please fill out all fields.");
                return;
            }

            inventory.push({ mfr, type, color, qty: 1 });
            sync();
            closeModal();
        }

        function updateQty(idx, newQty) {
            inventory[idx].qty = parseInt(newQty) || 0;
            sync();
        }

        function sync() {
            localStorage.setItem('user_inventory_data', JSON.stringify(inventory));
            renderItems();
        }

        // Initial Load
        renderItems();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilamentStock Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Filament Inventory</h1>
        <div class="top-bar">
            <select id="stockFilter" onchange="renderItems()">
                <option value="all">Show All</option>
                <option value="in">In Stock</option>
                <option value="out">Out of Stock</option>
            </select>
            <button onclick="toggleForm()" class="add-btn">+ Add Filament</button>
        </div>
    </header>

    <div id="form-container" class="hidden">
        <form id="itemForm" class="card">
            <h3>Add New Filament</h3>
            <div class="form-grid">
                <select id="brand" required>
                    <option value="" disabled selected>Manufacturer</option>
                    <option>BambuLabs</option>
                    <option>Elegoo</option>
                    <option>Creality</option>
                    <option>Anker</option>
                    <option>Anycubic</option>
                </select>
                
                <select id="type" required>
                    <option value="" disabled selected>Material Type</option>
                    <option>ABS</option>
                    <option>PLA</option>
                    <option>PLA Matte</option>
                    <option>PET-G</option>
                    <option>PET-G Transparent</option>
                </select>

                <div class="color-inputs">
                    <input type="color" id="colorPicker" value="#3498db">
                    <input type="text" id="hexInput" placeholder="#Hex Code" maxlength="7">
                </div>

                <input type="number" id="qty" placeholder="Quantity" min="0" required>
            </div>
            <div class="form-actions">
                <button type="submit">Save Item</button>
                <button type="button" onclick="toggleForm()" class="cancel-btn">Cancel</button>
            </div>
        </form>
    </div>

    <main id="inventory-grid"></main>

    <script>
        let products = JSON.parse(localStorage.getItem('myInventory')) || [];

        // Handle Color Sync
        const cp = document.getElementById('colorPicker');
        const hex = document.getElementById('hexInput');
        cp.oninput = () => hex.value = cp.value.toUpperCase();
        hex.oninput = () => { if(/^#[0-9A-F]{6}$/i.test(hex.value)) cp.value = hex.value; };

        function toggleForm() {
            document.getElementById('form-container').classList.toggle('hidden');
        }

        document.getElementById('itemForm').onsubmit = (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                brand: document.getElementById('brand').value,
                type: document.getElementById('type').value,
                color: cp.value,
                stock: parseInt(document.getElementById('qty').value),
                status: parseInt(document.getElementById('qty').value) > 0 ? 'in' : 'out'
            };
            products.push(newItem);
            saveAndRender();
            e.target.reset();
            toggleForm();
        };

        function deleteItem(id) {
            if (confirm("Are you sure you want to delete this filament?")) {
                products = products.filter(p => p.id !== id);
                saveAndRender();
            }
        }

        function updateQty(id, val) {
            const p = products.find(p => p.id === id);
            p.stock = parseInt(val);
            p.status = p.stock > 0 ? 'in' : 'out';
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myInventory', JSON.stringify(products));
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('inventory-grid');
            const filter = document.getElementById('stockFilter').value;
            grid.innerHTML = '';

            products.forEach(p => {
                if (filter !== 'all' && p.status !== filter) return;

                const card = document.createElement('div');
                card.className = `card ${p.status === 'out' ? 'oos' : ''}`;
                card.innerHTML = `
                    <button class="delete-x" onclick="deleteItem(${p.id})">&times;</button>
                    <div class="swatch" style="background:${p.color}"></div>
                    <h3>${p.brand}</h3>
                    <p>${p.type}</p>
                    <div class="controls">
                        <input type="number" value="${p.stock}" onchange="updateQty(${p.id}, this.value)">
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        renderItems();
    </script>
</body>
</html>

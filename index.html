<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Filament Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Filament Stock</h1>
            <select id="stockFilter" onchange="renderItems()">
                <option value="all">All Items</option>
                <option value="in">In Stock</option>
                <option value="out">Out of Stock</option>
            </select>
        </div>
    </header>

    <main id="inventory-grid">
        </main>

    <button class="fab" onclick="openModal()" title="Add New Item">+</button>

    <div id="modal-overlay">
        <div class="modal">
            <h2>Add New Filament</h2>
            
            <div class="form-group">
                <label>Manufacturer</label>
                <select id="mfrIn">
                    <option value="Anker">Anker</option>
                    <option value="Anycubic">Anycubic</option>
                    <option value="Bambu Labs">Bambu Labs</option>
                    <option value="Creality">Creality</option>
                    <option value="Elegoo">Elegoo</option>
                    <option value="Geeetech">Geeetech</option>
                    <option value="Prusa">Prusa</option>
                    <option value="Qidi">Qidi</option>
                    <option value="Tronxy">Tronxy</option>
                    <option value="Vivedino">Vivedino</option>
                    <option value="Voron">Voron</option>
                    <option value="Voxelab">Voxelab</option>
                </select>
            </div>

            <div class="form-group">
                <label>Type</label>
                <select id="typeIn">
                    <option value="PLA">PLA</option>
                    <option value="ABS">ABS</option>
                    <option value="PETG">PETG</option>
                    <option value="PETG-Translucent">PETG-Translucent</option>
                </select>
            </div>

            <div class="form-group">
                <label>Colour Selection</label>
                <div class="color-picker-container">
                    <input type="color" id="colorIn" value="#2563eb">
                    <span id="colorHexDisplay">#2563EB</span>
                </div>
            </div>

            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-add" onclick="saveItem()">Add to Stock</button>
            </div>
        </div>
    </div>

    <script>
        // Use a unique key for storage to avoid conflicts
        const STORAGE_KEY = 'filament_inventory_v2';
        let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // Update hex text in modal live
        document.getElementById('colorIn').addEventListener('input', (e) => {
            document.getElementById('colorHexDisplay').innerText = e.target.value.toUpperCase();
        });

        function renderItems() {
            const grid = document.getElementById('inventory-grid');
            const filter = document.getElementById('stockFilter').value;
            grid.innerHTML = '';

            const filteredList = inventory.filter(item => {
                if (filter === 'in') return item.qty > 0;
                if (filter === 'out') return item.qty === 0;
                return true;
            });

            if (filteredList.length === 0) {
                grid.innerHTML = '<div class="empty-state">Your inventory is empty. Click + to add filament!</div>';
                return;
            }

            filteredList.forEach((item) => {
                const realIdx = inventory.indexOf(item);
                const card = document.createElement('div');
                card.className = `card ${item.qty === 0 ? 'oos' : ''}`;
                
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteItem(${realIdx})" title="Remove Item">&times;</button>
                    
                    <div class="card-header">
                        <div class="card-title-area">
                            <h3>${item.mfr}</h3>
                            <p class="type-tag">${item.type}</p>
                            <span class="hex-badge">${item.color.toUpperCase()}</span>
                        </div>
                        <div class="color-swatch" style="background-color: ${item.color};"></div>
                    </div>
                    
                    <div class="controls">
                        <label>Inventory Qty:</label>
                        <input type="number" value="${item.qty}" min="0" onchange="updateQty(${realIdx}, this.value)">
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function saveItem() {
            const mfr = document.getElementById('mfrIn').value;
            const type = document.getElementById('typeIn').value;
            const color = document.getElementById('colorIn').value;

            inventory.push({ mfr, type, color, qty: 1 });
            sync();
            closeModal();
        }

        function deleteItem(idx) {
            const item = inventory[idx];
            if (confirm(`Remove ${item.mfr} ${item.type} (${item.color}) from your inventory?`)) {
                inventory.splice(idx, 1);
                sync();
            }
        }

        function updateQty(idx, val) {
            inventory[idx].qty = parseInt(val) || 0;
            sync();
        }

        function sync() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
            renderItems();
        }

        function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        // Initialize on page load
        renderItems();
    </script>
</body>
</html>
